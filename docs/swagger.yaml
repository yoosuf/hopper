basePath: /api
definitions:
  admin.SystemStats:
    properties:
      activeDeliveries:
        type: integer
      totalOrders:
        type: integer
      totalRestaurants:
        type: integer
      totalUsers:
        type: integer
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - customer
        - restaurant_owner
        - courier
        type: string
    required:
    - email
    - password
    - role
    type: object
  delivery.Delivery:
    properties:
      courierID:
        type: string
      deliveredAt:
        type: string
      id:
        type: string
      orderID:
        type: string
      pickedUpAt:
        type: string
      status:
        type: string
    type: object
  menus.CreateMenuItemRequest:
    properties:
      basePrice:
        type: integer
      category:
        type: string
      description:
        type: string
      name:
        type: string
      taxCategoryID:
        type: string
    type: object
  menus.MenuItem:
    properties:
      basePrice:
        type: integer
      category:
        type: string
      description:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      restaurantID:
        type: string
      taxCategoryID:
        type: string
    type: object
  notifications.Notification:
    properties:
      body:
        type: string
      channels:
        items:
          $ref: '#/definitions/notifications.NotificationChannel'
        type: array
      createdAt:
        type: string
      data:
        type: string
      id:
        type: string
      isRead:
        type: boolean
      title:
        type: string
      type:
        $ref: '#/definitions/notifications.NotificationType'
      userID:
        type: string
    type: object
  notifications.NotificationChannel:
    enum:
    - push
    - email
    - sms
    type: string
    x-enum-varnames:
    - ChannelPush
    - ChannelEmail
    - ChannelSMS
  notifications.NotificationType:
    enum:
    - order_created
    - order_confirmed
    - order_preparing
    - order_ready
    - order_picked_up
    - order_delivered
    - order_cancelled
    - payment_received
    - payment_failed
    type: string
    x-enum-varnames:
    - TypeOrderCreated
    - TypeOrderConfirmed
    - TypeOrderPreparing
    - TypeOrderReady
    - TypeOrderPickedUp
    - TypeOrderDelivered
    - TypeOrderCancelled
    - TypePaymentReceived
    - TypePaymentFailed
  orders.CreateOrderItem:
    properties:
      menuItemID:
        type: string
      quantity:
        type: integer
    type: object
  orders.CreateOrderRequest:
    properties:
      deliveryAddressID:
        type: string
      items:
        items:
          $ref: '#/definitions/orders.CreateOrderItem'
        type: array
      restaurantID:
        type: string
      scheduledFor:
        type: string
    type: object
  orders.Order:
    properties:
      createdAt:
        type: string
      currencyCode:
        type: string
      customerID:
        type: string
      deliveryAddressID:
        type: string
      deliveryFee:
        type: integer
      id:
        type: string
      regionID:
        type: string
      restaurantID:
        type: string
      scheduledFor:
        type: string
      subtotal:
        type: integer
      tax:
        type: integer
      total:
        type: integer
      workflowState:
        type: string
    type: object
  payments.CreatePaymentRequest:
    properties:
      amount:
        type: integer
      orderID:
        type: string
      paymentMethod:
        type: string
    type: object
  payments.Payment:
    properties:
      amount:
        type: integer
      currencyCode:
        type: string
      id:
        type: string
      orderID:
        type: string
      paymentMethod:
        type: string
      paymentProviderID:
        type: string
      status:
        type: string
    type: object
  promotions.CreatePromotionRequest:
    properties:
      code:
        maxLength: 50
        minLength: 3
        type: string
      discount_type:
        allOf:
        - $ref: '#/definitions/promotions.DiscountType'
        enum:
        - percentage
        - fixed
      discount_value:
        minimum: 1
        type: integer
      max_discount:
        minimum: 0
        type: integer
      min_order_value:
        minimum: 0
        type: integer
      region_id:
        type: string
      restaurant_id:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/promotions.PromotionType'
        enum:
        - coupon
        - discount
        - free_delivery
      usage_limit:
        minimum: 0
        type: integer
      valid_from:
        type: string
      valid_until:
        type: string
    required:
    - code
    - discount_type
    - discount_value
    - type
    - valid_from
    - valid_until
    type: object
  promotions.DiscountType:
    enum:
    - percentage
    - fixed
    type: string
    x-enum-varnames:
    - DiscountTypePercentage
    - DiscountTypeFixed
  promotions.Promotion:
    properties:
      code:
        type: string
      createdAt:
        type: string
      discountType:
        $ref: '#/definitions/promotions.DiscountType'
      discountValue:
        description: Percentage (0-100) or fixed amount in cents
        type: integer
      id:
        type: string
      isActive:
        type: boolean
      maxDiscount:
        description: Maximum discount amount in cents
        type: integer
      minOrderValue:
        description: Minimum order value in cents to apply promotion
        type: integer
      regionID:
        type: string
      restaurantID:
        type: string
      type:
        $ref: '#/definitions/promotions.PromotionType'
      updatedAt:
        type: string
      usageCount:
        description: Current usage count
        type: integer
      usageLimit:
        description: Maximum number of times it can be used (0 = unlimited)
        type: integer
      validFrom:
        type: string
      validUntil:
        type: string
    type: object
  promotions.PromotionType:
    enum:
    - coupon
    - discount
    - free_delivery
    type: string
    x-enum-varnames:
    - PromotionTypeCoupon
    - PromotionTypeDiscount
    - PromotionTypeFreeDelivery
  promotions.UpdatePromotionRequest:
    properties:
      code:
        maxLength: 50
        minLength: 3
        type: string
      discount_type:
        allOf:
        - $ref: '#/definitions/promotions.DiscountType'
        enum:
        - percentage
        - fixed
      discount_value:
        minimum: 1
        type: integer
      is_active:
        type: boolean
      max_discount:
        minimum: 0
        type: integer
      min_order_value:
        minimum: 0
        type: integer
      region_id:
        type: string
      restaurant_id:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/promotions.PromotionType'
        enum:
        - coupon
        - discount
        - free_delivery
      usage_limit:
        minimum: 0
        type: integer
      valid_from:
        type: string
      valid_until:
        type: string
    type: object
  regions.Region:
    properties:
      code:
        type: string
      countryCode:
        type: string
      currencyCode:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      timezone:
        type: string
    type: object
  regions.RegionConfig:
    properties:
      allowScheduledOrders:
        type: boolean
      defaultDeliveryWindowMinutes:
        type: integer
      deliveryFeeTaxableDefault:
        type: boolean
      orderActivationLeadMinutes:
        type: integer
      platformFeeBasisPoints:
        type: integer
      regionID:
        type: string
    type: object
  restaurants.CreateRestaurantRequest:
    properties:
      city:
        type: string
      countryCode:
        type: string
      cuisineType:
        type: string
      description:
        type: string
      email:
        type: string
      latitude:
        format: float64
        type: number
      longitude:
        format: float64
        type: number
      name:
        type: string
      phone:
        type: string
      postalCode:
        type: string
      regionID:
        type: string
      state:
        type: string
      streetAddress:
        type: string
      timezone:
        type: string
    type: object
  restaurants.Restaurant:
    properties:
      approvedAt:
        type: string
      city:
        type: string
      countryCode:
        type: string
      cuisineType:
        type: string
      currencyCode:
        type: string
      description:
        type: string
      email:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      isApproved:
        type: boolean
      latitude:
        format: float64
        type: number
      longitude:
        format: float64
        type: number
      name:
        type: string
      ownerID:
        type: string
      phone:
        type: string
      postalCode:
        type: string
      regionID:
        type: string
      state:
        type: string
      streetAddress:
        type: string
      timezone:
        type: string
    type: object
  restaurants.RestaurantHour:
    properties:
      closeTime:
        type: string
      dayOfWeek:
        type: integer
      id:
        type: string
      isClosed:
        type: boolean
      openTime:
        type: string
      restaurantID:
        type: string
    type: object
  reviews.CreateReviewRequest:
    properties:
      comment:
        maxLength: 1000
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
      target_id:
        type: string
      target_type:
        enum:
        - restaurant
        - courier
        - menu_item
        type: string
    required:
    - rating
    - target_id
    - target_type
    type: object
  reviews.ReviewResponse:
    properties:
      comment:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      target_id:
        type: string
      target_type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  reviews.UpdateReviewRequest:
    properties:
      comment:
        maxLength: 1000
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    type: object
  support.CreateMessageRequest:
    properties:
      content:
        type: string
    type: object
  support.CreateTicketRequest:
    properties:
      category:
        type: string
      description:
        type: string
      priority:
        $ref: '#/definitions/support.TicketPriority'
      subject:
        type: string
    type: object
  support.Message:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isSupport:
        type: boolean
      ticketID:
        type: string
      userID:
        type: string
    type: object
  support.Ticket:
    properties:
      assignedTo:
        type: string
      category:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      priority:
        $ref: '#/definitions/support.TicketPriority'
      resolvedAt:
        type: string
      status:
        $ref: '#/definitions/support.TicketStatus'
      subject:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  support.TicketPriority:
    enum:
    - low
    - medium
    - high
    - urgent
    type: string
    x-enum-varnames:
    - TicketPriorityLow
    - TicketPriorityMedium
    - TicketPriorityHigh
    - TicketPriorityUrgent
  support.TicketStatus:
    enum:
    - open
    - in_progress
    - resolved
    - closed
    type: string
    x-enum-varnames:
    - TicketStatusOpen
    - TicketStatusInProgress
    - TicketStatusResolved
    - TicketStatusClosed
  support.UpdateTicketRequest:
    properties:
      priority:
        $ref: '#/definitions/support.TicketPriority'
      status:
        $ref: '#/definitions/support.TicketStatus'
    type: object
  tax.CalculateTaxRequest:
    properties:
      deliveryFee:
        type: integer
      items:
        items:
          $ref: '#/definitions/tax.TaxableItem'
        type: array
      pricingMode:
        type: string
      taxZoneID:
        type: string
    type: object
  tax.TaxCalculation:
    properties:
      deliveryTax:
        type: integer
      itemTax:
        type: integer
      taxLines:
        items:
          $ref: '#/definitions/tax.TaxLine'
        type: array
      totalTax:
        type: integer
    type: object
  tax.TaxCategory:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  tax.TaxLine:
    properties:
      isInclusive:
        type: boolean
      taxAmount:
        type: integer
      taxCategoryID:
        type: string
      taxRateBPS:
        type: integer
      taxRateName:
        type: string
      taxableAmount:
        type: integer
    type: object
  tax.TaxRate:
    properties:
      appliesToDeliveryFee:
        type: boolean
      effectiveFrom:
        type: string
      effectiveTo:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      isInclusive:
        type: boolean
      name:
        type: string
      rateBPS:
        type: integer
      taxCategoryID:
        type: string
      taxZoneID:
        type: string
    type: object
  tax.TaxZone:
    properties:
      city:
        type: string
      code:
        type: string
      countryCode:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      postalCodePattern:
        type: string
      state:
        type: string
    type: object
  tax.TaxableItem:
    properties:
      amount:
        type: integer
      taxCategoryID:
        type: string
    type: object
  users.Address:
    properties:
      city:
        type: string
      countryCode:
        type: string
      id:
        type: string
      isDefault:
        type: boolean
      latitude:
        format: float64
        type: number
      longitude:
        format: float64
        type: number
      postalCode:
        type: string
      state:
        type: string
      streetAddress:
        type: string
      userID:
        type: string
    type: object
  users.CreateAddressRequest:
    properties:
      city:
        type: string
      countryCode:
        type: string
      isDefault:
        type: boolean
      latitude:
        format: float64
        type: number
      longitude:
        format: float64
        type: number
      postalCode:
        type: string
      state:
        type: string
      streetAddress:
        type: string
    type: object
  users.UpdateProfileRequest:
    properties:
      firstName:
        type: string
      lastName:
        type: string
    type: object
  users.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isSuspended:
        type: boolean
      lastName:
        type: string
      passwordHash:
        type: string
      role:
        type: string
      updatedAt:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for an Uber Eats clone API. You can visit the
    Swagger UI documentation at /swagger/index.html
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Uber Eats Clone API
  version: "1.0"
paths:
  /admin/restaurants/{id}/approve:
    put:
      consumes:
      - application/json
      description: Approve a restaurant registration (admin only)
      parameters:
      - description: Restaurant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Restaurant approved successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid restaurant ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Restaurant not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Approve restaurant
      tags:
      - admin
  /admin/restaurants/{id}/reject:
    put:
      consumes:
      - application/json
      description: Reject a restaurant registration (admin only)
      parameters:
      - description: Restaurant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Restaurant rejected successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid restaurant ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Restaurant not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reject restaurant
      tags:
      - admin
  /admin/restaurants/pending:
    get:
      consumes:
      - application/json
      description: Retrieve all restaurants pending approval (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: Pending restaurants retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List pending restaurants
      tags:
      - admin
  /admin/stats:
    get:
      consumes:
      - application/json
      description: Retrieve system statistics (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: System statistics retrieved successfully
          schema:
            $ref: '#/definitions/admin.SystemStats'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get system statistics
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Account suspended
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate refresh token on logout
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LogoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Logout successful
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid or expired token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email, password, and role
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /delivery/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a specific delivery by its ID
      parameters:
      - description: Delivery ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Delivery retrieved successfully
          schema:
            $ref: '#/definitions/delivery.Delivery'
        "400":
          description: Invalid delivery ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Delivery not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get delivery by ID
      tags:
      - delivery
  /delivery/{id}/delivered:
    put:
      consumes:
      - application/json
      description: Mark a delivery as delivered by the courier
      parameters:
      - description: Delivery ID
        in: path
        name: id
        required: true
        type: string
      produces:
